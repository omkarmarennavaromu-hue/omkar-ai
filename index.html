<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OMKAR AI — Intelligence Redefined</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

    <style>
        /* (your entire UI stays EXACTLY same — no changes needed) */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, rgba(15, 15, 35, 1) 0%, rgba(5, 5, 20, 1) 100%);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .app-container {
            width: 100%;
            max-width: 880px;
            height: 90vh;
            background: rgba(18, 20, 32, 0.55);
            backdrop-filter: blur(18px);
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
        }

        .tagline {
            font-size: 0.8rem;
            color: #9aa1b9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
        }

        .user-message { justify-content: flex-end; }
        .ai-message { justify-content: flex-start; }

        .bubble {
            max-width: 75%;
            padding: 0.8rem 1.2rem;
            border-radius: 20px;
            color: white;
            font-size: 0.95rem;
            background: rgba(255,255,255,0.08);
        }

        .user-message .bubble {
            background: linear-gradient(135deg, #2b2d46, #1e1f33);
        }

        .ai-message .bubble {
            background: rgba(28,30,48,0.7);
            border: 1px solid rgba(95,108,255,0.3);
        }

        .input-wrapper {
            padding: 1rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .input-group {
            display: flex;
            gap: 10px;
            background: rgba(20,22,38,0.7);
            border-radius: 50px;
            padding: 0.4rem;
        }

        input {
            flex: 1;
            border: none;
            background: transparent;
            color: white;
            padding: 0.8rem;
            outline: none;
        }

        button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg,#4f5bff,#6c3dff);
            color: white;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

<div class="app-container">
    <div class="chat-header">
        <div class="title">OMKAR AI</div>
        <div class="tagline">Built for intelligence</div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message ai-message">
            <div class="bubble">Hello, I'm Omkar AI. Ask me anything.</div>
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-group">
            <input id="messageInput" placeholder="Ask me anything..." />
            <button id="sendBtn">➤</button>
        </div>
    </div>
</div>

<script>
const messagesContainer = document.getElementById("chatMessages");
const input = document.getElementById("messageInput");
const button = document.getElementById("sendBtn");

// 🔥 IMPORTANT: change this if backend is deployed
const API_URL = "http://localhost:3000/chat";

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = `message ${type}-message`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    div.appendChild(bubble);
    messagesContainer.appendChild(div);

    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    button.disabled = true;
    input.disabled = true;

    // typing indicator
    const typing = document.createElement("div");
    typing.className = "message ai-message";
    typing.innerHTML = `<div class="bubble">Thinking...</div>`;
    messagesContainer.appendChild(typing);

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message })
        });

        const data = await res.json();

        typing.remove();

        addMessage(
            data.reply || "No response from AI",
            "ai"
        );

    } catch (err) {
        typing.remove();
        addMessage("Connection error. Backend not reachable.", "ai");
        console.error(err);
    }

    button.disabled = false;
    input.disabled = false;
    input.focus();
}

button.addEventListener("click", sendMessage);

input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
